<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalbskinder</title>
    <link rel="icon" type="image/png" href="/images/favicon.png"">
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
</head>
<body>
    <main class="shell">
        <header class="topbar">
            <div class="brand" aria-label="Site brand">
                <span class="brand-text">Kalbskinder</span>
            </div>
            <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
                <i data-lucide="moon"></i>
                <span id="theme-label">Dark</span>
            </button>
        </header>

        <section class="hero" id="top">
            <div>
                <p class="eyebrow">Developer Profile</p>
                <h1>Hi, I'm <strong>Kalbskinder</strong></h1>
                <p class="subtitle">
                    I love creating tools that make complex tasks easier and more enjoyable.
                </p>

                <div class="meta-row">
                    <span class="meta-pill"><i data-lucide="map-pin"></i> Zurich, Switzerland</span>
                    <span class="meta-pill"><i data-lucide="clock-3"></i> <span id="time">--:--</span></span>
                    <span class="meta-pill"><i data-lucide="cake"></i> <span id="age">--yo</span></span>
                </div>

                <div class="hero-actions">
                    <div class="socials" aria-label="Social links">
                        <a class="social-link" href="https://github.com/Kalbskinder" target="_blank" rel="noreferrer" aria-label="GitHub">
                            <i class="bi bi-github"></i>   
                            GitHub
                        </a>

                            Modrinth
                        </a>
                        <a class="social-link" href="https://www.youtube.com/@kalbskinder" target="_blank" rel="noreferrer" aria-label="YouTube">
                            <i class="bi bi-youtube"></i>
                            YouTube
                        </a>
                    </div>
                </div>
            </div>

            <aside class="hero-art" aria-hidden="true">
                <canvas id="skin-viewer" class="skin-viewer" aria-label="Minecraft skin preview"></canvas>
            </aside>
        </section>

        <section class="projects" id="projects">
            <div class="projects-header">
                <p class="eyebrow">Selected Work</p>
                <h2>Projects</h2>
            </div>
            <div class="projects-grid" id="card-container"></div>
        </section>
    </main>

    <template id="project-card-template">
        <article class="card">
            <div class="card-main">
                <img class="card-image" src="" alt="">
                <div>
                    <h3 class="card-header"></h3>
                    <p class="card-description"></p>
                </div>
            </div>
            <div class="card-actions">
                <a class="card-button top-button" href="#" target="_blank" rel="noreferrer">
                    <i data-lucide="download"></i>
                    <span>Download</span>
                </a>
                <a class="card-button bottom-button" href="#" target="_blank" rel="noreferrer">
                    <i data-lucide="code-2"></i>
                    <span>View Source</span>
                </a>
            </div>
            <div class="card-tags"></div>
        </article>
    </template>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/skinview3d@3.4.2/bundles/skinview3d.bundle.js"></script>
    <script src="./projects.js"></script>
    <script src="./main.js"></script>
</body>
</html>
